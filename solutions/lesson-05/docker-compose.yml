# Grows one service per lesson. See VERSION_MANIFEST.md for why each image
# tag below is pinned to that exact version.
services:
  postgres:
    image: postgres:18.4-alpine
    container_name: gateway-postgres
    environment:
      POSTGRES_DB: gateway
      POSTGRES_USER: gateway
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      # PostgreSQL 18's official image stores data under a major-version
      # subdirectory of /var/lib/postgresql (not directly in .../data) —
      # mount the parent, not the data dir, or the container refuses to boot.
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gateway -d gateway"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - gateway-net

  keycloak:
    image: quay.io/keycloak/keycloak:26.7.0
    container_name: gateway-keycloak
    command: start-dev --import-realm --http-port=8180
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "8180:8180"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    healthcheck:
      # The keycloak image ships no curl/wget; the realm import completes
      # before Keycloak starts listening, so a bare TCP check on 8180 is a
      # reliable readiness signal.
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8180'"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - gateway-net

  gateway:
    build:
      context: ./gateway
      args:
        CLAUDE_VERSION: "2.1.207"
    container_name: gateway
    ports:
      - "8080:8080"
    environment:
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      GATEWAY_JWT_SECRET: ${GATEWAY_JWT_SECRET}
      GATEWAY_POSTGRES_URL: postgres://gateway:${POSTGRES_PASSWORD}@postgres:5432/gateway?sslmode=disable
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    volumes:
      - ./gateway/gateway.yaml:/etc/claude/gateway.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    restart: on-failure
    networks:
      - gateway-net

networks:
  gateway-net:
    driver: bridge

volumes:
  postgres-data:
